<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ECE Attendance Management System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo-circle">ECE</div>
    <h1>ECE ATTENDANCE</h1>
    <p class="login-sub">College Attendance Portal</p>

    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required>

      <button type="submit" class="login-btn">LOGIN</button>
      <p id="loginError" class="login-error"></p>
    </form>

    <p class="login-hint">CR: <b>cr</b> / <b>1234</b> &nbsp;|&nbsp; Advisor: <b>advisor</b> / <b>admin123</b></p>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
