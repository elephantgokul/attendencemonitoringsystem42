<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1f3d">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Login - VLSI Attendance Management System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo-circle">VLSI</div>
    <h1>VLSI ATTENDANCE</h1>
    <p class="login-sub">College Attendance Portal</p>

    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>

      <button type="submit" class="login-btn">LOGIN</button>
      <p id="loginError" class="login-error"></p>
    </form>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
